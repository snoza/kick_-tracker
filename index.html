<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kick Tracker</title>
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
            background: #0a0a0a;
            color: #fff;
        }
        .container {
            background: #1a1a1a;
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        button {
            background: #00ff88;
            color: #0a0a0a;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s;
        }
        button:hover {
            transform: scale(1.02);
            background: #00ff99;
        }
        .status {
            margin-top: 20px;
            padding: 15px;
            border-radius: 8px;
            background: #2a2a2a;
            font-family: monospace;
            white-space: pre-wrap;
            word-break: break-all;
        }
        .error {
            background: #330000;
            color: #ff8888;
            border-left: 4px solid #ff0000;
        }
        .success {
            background: #003300;
            color: #88ff88;
            border-left: 4px solid #00ff00;
        }
        input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            background: #2a2a2a;
            border: 1px solid #444;
            color: #fff;
            border-radius: 6px;
        }
        label {
            font-weight: bold;
            display: block;
            margin-top: 10px;
        }
        h1 {
            margin-top: 0;
            color: #00ff88;
        }
        hr {
            border-color: #333;
            margin: 20px 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎯 Kick Tracker</h1>
        
        <div id="authSection">
            <button id="loginBtn">🔐 Login with Kick</button>
        </div>
        
        <div id="userInfo" style="display:none;">
            <h2>✅ Connected!</h2>
            <div id="userData" class="status success"></div>
            <button id="logoutBtn">🚪 Logout</button>
        </div>
        
        <div id="debugSection">
            <hr>
            <h3>🔍 Debug Info</h3>
            <div id="debugLog" class="status"></div>
        </div>
    </div>

    <script>
        // ===== CONFIGURATION =====
        // IMPORTANT: Replace with your actual values from Kick Developer Dashboard
        const CLIENT_ID = 'YOUR_CLIENT_ID_HERE';  // ← Replace with your client ID
        const CLIENT_SECRET = 'YOUR_NEW_SECRET_HERE';  // ← Replace with your NEW regenerated secret
        const REDIRECT_URI = 'https://snoza.github.io/kick_-tracker/';  // ← Make sure this EXACTLY matches Kick Dashboard (including trailing slash)
        const AUTH_URL = 'https://id.kick.com/oauth/authorize';
        const TOKEN_URL = 'https://id.kick.com/oauth/token';
        const API_URL = 'https://api.kick.com/v2';

        // Helper function to add debug logs
        function addDebugLog(message, isError = false) {
            const debugDiv = document.getElementById('debugLog');
            const timestamp = new Date().toLocaleTimeString();
            const logEntry = document.createElement('div');
            logEntry.style.color = isError ? '#ff8888' : '#88ff88';
            logEntry.style.marginBottom = '5px';
            logEntry.style.borderBottom = '1px solid #333';
            logEntry.style.padding = '5px';
            logEntry.innerHTML = `[${timestamp}] ${message}`;
            debugDiv.appendChild(logEntry);
            debugDiv.scrollTop = debugDiv.scrollHeight;
            console.log(message);
        }

        // Generate random string for PKCE verifier
        function generateCodeVerifier() {
            const array = new Uint8Array(32);
            crypto.getRandomValues(array);
            return btoa(String.fromCharCode(...array))
                .replace(/\+/g, '-')
                .replace(/\//g, '_')
                .replace(/=+$/, '');
        }

        // Generate code challenge from verifier (SHA256)
        async function generateCodeChallenge(verifier) {
            const encoder = new TextEncoder();
            const data = encoder.encode(verifier);
            const digest = await crypto.subtle.digest('SHA-256', data);
            return btoa(String.fromCharCode(...new Uint8Array(digest)))
                .replace(/\+/g, '-')
                .replace(/\//g, '_')
                .replace(/=+$/, '');
        }

        // Generate random state for CSRF protection
        function generateState() {
            const array = new Uint8Array(16);
            crypto.getRandomValues(array);
            return Array.from(array, byte => byte.toString(16).padStart(2, '0')).join('');
        }

        // Get URL parameters
        function getUrlParams() {
            const params = new URLSearchParams(window.location.search);
            return {
                code: params.get('code'),
                state: params.get('state'),
                error: params.get('error'),
                errorDescription: params.get('error_description')
            };
        }

        // Clear OAuth data from localStorage
        function clearOAuthData() {
            localStorage.removeItem('pkce_verifier');
            localStorage.removeItem('oauth_state');
            localStorage.removeItem('kick_access_token');
            localStorage.removeItem('kick_user');
        }

        // Handle the OAuth callback
        async function handleCallback() {
            const { code, state, error, errorDescription } = getUrlParams();
            
            addDebugLog('🔍 Checking for callback parameters...');
            
            if (error) {
                addDebugLog(`❌ OAuth Error: ${error} - ${errorDescription}`, true);
                return false;
            }
            
            if (!code) {
                addDebugLog('ℹ️ No authorization code found in URL', false);
                return false;
            }
            
            addDebugLog(`✅ Authorization code received: ${code.substring(0, 20)}...`);
            
            // Get stored PKCE verifier and state from localStorage
            const storedVerifier = localStorage.getItem('pkce_verifier');
            const storedState = localStorage.getItem('oauth_state');
            
            addDebugLog(`📦 Stored verifier: ${storedVerifier ? 'Found' : 'NOT FOUND'}`, !storedVerifier);
            addDebugLog(`📦 Stored state: ${storedState ? 'Found' : 'NOT FOUND'}`, !storedState);
            
            // Verify state parameter (CSRF protection)
            if (state !== storedState) {
                addDebugLog(`❌ State mismatch! Expected: ${storedState}, Got: ${state}`, true);
                clearOAuthData();
                return false;
            }
            
            addDebugLog('✅ State verified successfully');
            
            if (!storedVerifier) {
                addDebugLog('❌ PKCE verifier not found in localStorage!', true);
                clearOAuthData();
                return false;
            }
            
            // Exchange code for token
            try {
                addDebugLog('🔄 Exchanging code for access token...');
                addDebugLog(`📤 Request params: grant_type=authorization_code, client_id=${CLIENT_ID}, redirect_uri=${REDIRECT_URI}`);
                
                const tokenResponse = await fetch(TOKEN_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/x-www-form-urlencoded',
                    },
                    body: new URLSearchParams({
                        grant_type: 'authorization_code',
                        client_id: 01KQ4ZTP7B05RBR0H6WWX996KX,
                        client_secret: 631b4a6f24b090ee847d1dc21a62fb269b65f2e5ec9c8d61815c5c13e95567bf,  // ← REQUIRED for Kick!
                        code: code,
                        redirect_uri: REDIRECT_URI,
                        code_verifier: storedVerifier,
                    })
                });
                
                const responseText = await tokenResponse.text();
                addDebugLog(`📥 Token response status: ${tokenResponse.status}`);
                addDebugLog(`📥 Token response body: ${responseText.substring(0, 500)}`);
                
                if (!tokenResponse.ok) {
                    addDebugLog(`❌ Token exchange failed with status ${tokenResponse.status}: ${responseText}`, true);
                    clearOAuthData();
                    return false;
                }
                
                const tokenData = JSON.parse(responseText);
                addDebugLog(`✅ Access token received! Expires in: ${tokenData.expires_in} seconds`);
                
                // Store the access token
                localStorage.setItem('kick_access_token', tokenData.access_token);
                
                // Clear OAuth temp data
                clearOAuthData();  // This clears verifier/state but keeps token
                localStorage.setItem('kick_access_token', tokenData.access_token);  // Re-save token
                
                // Fetch user info
                await fetchUserInfo(tokenData.access_token);
                
                // Clean URL (remove query parameters)
                window.history.replaceState({}, document.title, window.location.pathname);
                
                return true;
                
            } catch (error) {
                addDebugLog(`❌ Exception during token exchange: ${error.message}`, true);
                clearOAuthData();
                return false;
            }
        }
        
        // Fetch user info from Kick API
        async function fetchUserInfo(accessToken) {
            try {
                addDebugLog('👤 Fetching user info...');
                const response = await fetch(`${API_URL}/user`, {
                    headers: {
                        'Authorization': `Bearer ${accessToken}`
                    }
                });
                
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }
                
                const userData = await response.json();
                addDebugLog(`✅ User info received: ${userData.name || userData.username}`);
                
                localStorage.setItem('kick_user', JSON.stringify(userData));
                displayUserInfo(userData);
                
            } catch (error) {
                addDebugLog(`❌ Failed to fetch user info: ${error.message}`, true);
            }
        }
        
        // Display user info in UI
        function displayUserInfo(userData) {
            document.getElementById('authSection').style.display = 'none';
            document.getElementById('userInfo').style.display = 'block';
            
            const userDiv = document.getElementById('userData');
            userDiv.innerHTML = `
                <strong>Username:</strong> ${userData.username || userData.name}<br>
                <strong>User ID:</strong> ${userData.id}<br>
                <strong>Email:</strong> ${userData.email || 'Not available'}<br>
                ${userData.profile_picture ? `<img src="${userData.profile_picture}" style="width:50px; border-radius:50%; margin-top:10px;">` : ''}
            `;
        }
        
        // Check if user is already logged in
        async function checkExistingLogin() {
            const token = localStorage.getItem('kick_access_token');
            if (token) {
                addDebugLog('🔐 Found existing access token');
                await fetchUserInfo(token);
            } else {
                addDebugLog('ℹ️ No existing session found');
            }
        }
        
        // Handle login
        async function login() {
            addDebugLog('🚀 Starting login flow...');
            
            // Generate PKCE values
            const codeVerifier = generateCodeVerifier();
            const codeChallenge = await generateCodeChallenge(codeVerifier);
            const state = generateState();
            
            addDebugLog('🔑 Generated PKCE verifier and challenge');
            
            // Store in localStorage (not sessionStorage)
            localStorage.setItem('pkce_verifier', codeVerifier);
            localStorage.setItem('oauth_state', state);
            
            addDebugLog('💾 Saved PKCE data to localStorage');
            
            // Build authorization URL
            const authParams = new URLSearchParams({
                response_type: 'code',
                client_id: CLIENT_ID,
                redirect_uri: REDIRECT_URI,
                scope: 'user:read',
                state: state,
                code_challenge: codeChallenge,
                code_challenge_method: 'S256'
            });
            
            const authUrl = `${AUTH_URL}?${authParams.toString()}`;
            addDebugLog(`🌐 Redirecting to: ${AUTH_URL}`);
            addDebugLog(`📍 Redirect URI: ${REDIRECT_URI}`);
            
            // Redirect to Kick login
            window.location.href = authUrl;
        }
        
        // Handle logout
        function logout() {
            clearOAuthData();
            document.getElementById('authSection').style.display = 'block';
            document.getElementById('userInfo').style.display = 'none';
            document.getElementById('debugLog').innerHTML = '';
            addDebugLog('👋 Logged out successfully');
        }
        
        // Event listeners
        document.getElementById('loginBtn').addEventListener('click', login);
        const logoutBtn = document.getElementById('logoutBtn');
        if (logoutBtn) {
            logoutBtn.addEventListener('click', logout);
        }
        
        // Initialize app
        async function init() {
            addDebugLog('🎯 Kick Tracker initialized');
            addDebugLog(`📋 Redirect URI configured: ${REDIRECT_URI}`);
            addDebugLog(`🔑 Client ID configured: ${CLIENT_ID.substring(0, 10)}...`);
            
            // Check for OAuth callback
            const handled = await handleCallback();
            
            if (!handled) {
                // Check for existing session
                await checkExistingLogin();
            }
        }
        
        // Run initialization
        init();
    </script>
</body>
</html>
