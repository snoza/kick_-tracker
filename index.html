<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>البثوث المجدولة | Kick</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --green: #53fc18;
    --green-dim: #2a7d0c;
    --bg: #0a0a0a;
    --surface: #111111;
    --surface2: #1a1a1a;
    --border: #222;
    --text: #f0f0f0;
    --muted: #666;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Cairo', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 18px 32px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 1.3rem;
    font-weight: 900;
    color: var(--green);
  }

  .header-right { display: flex; align-items: center; gap: 12px; }

  #user-info {
    display: none;
    align-items: center;
    gap: 10px;
    font-size: 0.9rem;
    color: var(--muted);
  }

  #user-info img {
    width: 32px; height: 32px;
    border-radius: 50%;
    border: 2px solid var(--green);
  }

  #user-info span { color: var(--text); font-weight: 600; }

  .btn {
    padding: 9px 20px;
    border-radius: 8px;
    border: none;
    font-family: 'Cairo', sans-serif;
    font-weight: 700;
    font-size: 0.9rem;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 7px;
  }

  .btn-primary { background: var(--green); color: #000; }
  .btn-primary:hover { background: #6dff2e; transform: translateY(-1px); }

  .btn-ghost {
    background: transparent;
    color: var(--muted);
    border: 1px solid var(--border);
  }
  .btn-ghost:hover { color: var(--text); border-color: #444; }

  #login-screen {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: calc(100vh - 65px);
    text-align: center;
    padding: 40px 20px;
  }

  .hero-icon {
    width: 80px; height: 80px;
    background: var(--green);
    border-radius: 20px;
    display: flex; align-items: center; justify-content: center;
    margin-bottom: 28px;
    box-shadow: 0 0 40px #53fc1840;
  }

  .hero-icon svg { width: 44px; height: 44px; }

  #login-screen h1 { font-size: 2rem; font-weight: 900; margin-bottom: 12px; }
  #login-screen h1 span { color: var(--green); }

  #login-screen p {
    color: var(--muted);
    font-size: 1rem;
    max-width: 380px;
    line-height: 1.7;
    margin-bottom: 32px;
  }

  #app { display: none; padding: 28px 32px; max-width: 1200px; margin: 0 auto; }

  .filters {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 28px;
    flex-wrap: wrap;
  }

  .filters h2 { font-size: 1.2rem; font-weight: 700; flex: 1; }

  .filter-tabs {
    display: flex;
    gap: 6px;
    background: var(--surface);
    padding: 4px;
    border-radius: 10px;
    border: 1px solid var(--border);
  }

  .tab {
    padding: 6px 16px;
    border-radius: 7px;
    font-family: 'Cairo', sans-serif;
    font-size: 0.85rem;
    font-weight: 600;
    border: none;
    cursor: pointer;
    background: transparent;
    color: var(--muted);
    transition: all 0.2s;
  }
  .tab.active { background: var(--green); color: #000; }
  .tab:hover:not(.active) { color: var(--text); }

  .cards-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 18px;
  }

  .stream-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    overflow: hidden;
    transition: all 0.25s;
    animation: fadeIn 0.35s ease both;
  }

  .stream-card:hover {
    border-color: var(--green-dim);
    transform: translateY(-3px);
    box-shadow: 0 8px 30px rgba(83,252,24,0.08);
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .card-banner { height: 10px; background: linear-gradient(90deg, var(--green), #2af598); }
  .card-body { padding: 16px 18px; }

  .card-header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 14px;
  }

  .avatar {
    width: 46px; height: 46px;
    border-radius: 50%;
    border: 2px solid var(--green);
    object-fit: cover;
    flex-shrink: 0;
  }

  .avatar-placeholder {
    width: 46px; height: 46px;
    border-radius: 50%;
    border: 2px solid var(--green);
    background: var(--surface2);
    display: flex; align-items: center; justify-content: center;
    font-size: 1.2rem;
    font-weight: 700;
    color: var(--green);
    flex-shrink: 0;
  }

  .streamer-info { flex: 1; min-width: 0; }

  .streamer-name {
    font-weight: 700;
    font-size: 0.95rem;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .streamer-sub {
    font-size: 0.78rem;
    color: var(--muted);
    margin-top: 2px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .live-badge {
    background: #ff4444;
    color: #fff;
    font-size: 0.7rem;
    font-weight: 700;
    padding: 3px 8px;
    border-radius: 5px;
    display: flex;
    align-items: center;
    gap: 4px;
    flex-shrink: 0;
  }

  .live-badge::before {
    content: '';
    width: 6px; height: 6px;
    border-radius: 50%;
    background: #fff;
    animation: pulse 1s infinite;
  }

  @keyframes pulse { 0%,100% { opacity:1 } 50% { opacity:0.3 } }

  .stream-title {
    font-size: 0.88rem;
    color: var(--text);
    margin-bottom: 14px;
    line-height: 1.5;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .card-meta { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }

  .meta-pill {
    display: flex;
    align-items: center;
    gap: 5px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 4px 10px;
    font-size: 0.78rem;
    color: var(--muted);
  }

  .meta-pill.countdown {
    background: rgba(83,252,24,0.08);
    border-color: var(--green-dim);
    color: var(--green);
    font-weight: 700;
  }

  .card-footer {
    margin-top: 14px;
    padding-top: 12px;
    border-top: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .watch-link {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: var(--green);
    color: #000;
    text-decoration: none;
    font-weight: 700;
    font-size: 0.82rem;
    padding: 6px 14px;
    border-radius: 7px;
    transition: all 0.2s;
  }
  .watch-link:hover { background: #6dff2e; }

  .notify-btn {
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 7px;
    color: var(--muted);
    padding: 6px 10px;
    cursor: pointer;
    font-size: 0.9rem;
    transition: all 0.2s;
  }
  .notify-btn:hover { border-color: var(--green-dim); color: var(--green); }
  .notify-btn.active { border-color: var(--green); color: var(--green); background: rgba(83,252,24,0.08); }

  .empty-state {
    text-align: center;
    padding: 80px 20px;
    color: var(--muted);
    grid-column: 1/-1;
  }
  .empty-state strong { display: block; font-size: 1rem; color: var(--text); margin-bottom: 6px; }
  .empty-state p { font-size: 0.9rem; }

  .skeleton-card {
    background: linear-gradient(90deg, var(--surface) 25%, var(--surface2) 50%, var(--surface) 75%);
    background-size: 200% 100%;
    animation: shimmer 1.4s infinite;
    border-radius: 14px;
    height: 220px;
    border: 1px solid var(--border);
  }
  @keyframes shimmer { 0% { background-position: 200% 0 } 100% { background-position: -200% 0 } }

  #toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 12px 24px;
    border-radius: 10px;
    font-size: 0.9rem;
    font-weight: 600;
    transition: transform 0.3s;
    z-index: 999;
    white-space: nowrap;
  }
  #toast.show { transform: translateX(-50%) translateY(0); }

  @media (max-width: 600px) {
    header { padding: 14px 16px; }
    #app { padding: 20px 16px; }
    .cards-grid { grid-template-columns: 1fr; }
    .filters { flex-direction: column; align-items: flex-start; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">
    <svg viewBox="0 0 24 24" width="26" height="26" fill="currentColor"><path d="M2 2v15l5-5h15V2H2zm13 10H7V4h8v8zm2-2V6l3 3-3 3z"/></svg>
    البثوث المجدولة
  </div>
  <div class="header-right">
    <div id="user-info">
      <img id="user-avatar" src="" alt="">
      <span id="user-name"></span>
    </div>
    <button class="btn btn-ghost" id="logout-btn" style="display:none" onclick="logout()">خروج</button>
    <button class="btn btn-primary" id="login-btn" onclick="startOAuth()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M2 2v15l5-5h15V2H2z"/></svg>
      دخول بـ Kick
    </button>
  </div>
</header>

<div id="login-screen">
  <div class="hero-icon">
    <svg viewBox="0 0 24 24" fill="#000"><path d="M8 5v14l11-7z"/></svg>
  </div>
  <h1>بثوث من <span>تتابع</span></h1>
  <p>سجّل دخولك بحساب Kick وشوف البثوث المجدولة والمباشرة لكل الستريمرز اللي تتابعهم</p>
  <button class="btn btn-primary" style="font-size:1rem;padding:12px 32px" onclick="startOAuth()">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M2 2v15l5-5h15V2H2z"/></svg>
    دخول بـ Kick
  </button>
</div>

<div id="app">
  <div class="filters">
    <h2>📅 البثوث المجدولة</h2>
    <div class="filter-tabs">
      <button class="tab active" onclick="filterCards('all',this)">الكل</button>
      <button class="tab" onclick="filterCards('live',this)">يبث الآن 🔴</button>
      <button class="tab" onclick="filterCards('today',this)">اليوم</button>
      <button class="tab" onclick="filterCards('upcoming',this)">قادم</button>
    </div>
    <button class="btn btn-ghost" onclick="loadData()" style="font-size:0.82rem;padding:7px 14px">🔄 تحديث</button>
  </div>
  <div class="cards-grid" id="cards-grid"></div>
</div>

<div id="toast"></div>

<script>
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
//  CONFIG — FINAL FIXED VERSION
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
const CLIENT_ID    = '01KQ4ZTP7B05RBR0H6WWX996KX';
// IMPORTANT: This MUST match your Kick app redirect URI exactly
const REDIRECT_URI = 'https://snoza.github.io/kick_-tracker';
const SCOPES       = 'user:read channel:read';

console.log('=== APP LOADED ===');
console.log('Client ID:', CLIENT_ID);
console.log('Redirect URI:', REDIRECT_URI);
console.log('Current URL:', window.location.href);

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
//  PKCE
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function generateRandomString(length = 64) {
  const array = new Uint8Array(length);
  crypto.getRandomValues(array);
  return btoa(String.fromCharCode(...array))
    .replace(/\+/g, '-')
    .replace(/\//g, '_')
    .replace(/=/g, '')
    .slice(0, length);
}

async function generateCodeChallenge(codeVerifier) {
  const encoder = new TextEncoder();
  const data = encoder.encode(codeVerifier);
  const digest = await crypto.subtle.digest('SHA-256', data);
  return btoa(String.fromCharCode(...new Uint8Array(digest)))
    .replace(/\+/g, '-')
    .replace(/\//g, '_')
    .replace(/=/g, '');
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
//  OAUTH — COMPLETELY REWRITTEN
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
async function startOAuth() {
  console.log('=== STARTING OAUTH ===');
  
  const codeVerifier = generateRandomString(64);
  const state = generateRandomString(16);
  const codeChallenge = await generateCodeChallenge(codeVerifier);
  
  console.log('Code Verifier (first 20 chars):', codeVerifier.substring(0, 20) + '...');
  console.log('State:', state);
  console.log('Code Challenge (first 20 chars):', codeChallenge.substring(0, 20) + '...');
  
  // Store for later
  sessionStorage.setItem('pkce_verifier', codeVerifier);
  sessionStorage.setItem('oauth_state', state);
  
  // Build authorization URL
  const params = new URLSearchParams({
    client_id: CLIENT_ID,
    redirect_uri: REDIRECT_URI,
    response_type: 'code',
    scope: SCOPES,
    state: state,
    code_challenge: codeChallenge,
    code_challenge_method: 'S256'
  });
  
  const authUrl = `https://id.kick.com/oauth/authorize?${params.toString()}`;
  console.log('Auth URL:', authUrl);
  
  // Redirect to Kick
  window.location.href = authUrl;
}

async function handleCallback(code, receivedState) {
  console.log('=== HANDLE CALLBACK ===');
  console.log('Code received (first 20 chars):', code.substring(0, 20) + '...');
  console.log('State received:', receivedState);
  
  const storedState = sessionStorage.getItem('oauth_state');
  const storedVerifier = sessionStorage.getItem('pkce_verifier');
  
  console.log('Stored state:', storedState);
  console.log('Stored verifier exists:', !!storedVerifier);
  
  // Verify state
  if (receivedState !== storedState) {
    console.error('STATE MISMATCH!');
    showToast('❌ خطأ في التحقق من الأمان');
    return;
  }
  
  showToast('⏳ جاري تسجيل الدخول...');
  
  // Prepare token request
  const tokenParams = new URLSearchParams({
    grant_type: 'authorization_code',
    client_id: CLIENT_ID,
    redirect_uri: REDIRECT_URI,
    code: code,
    code_verifier: storedVerifier
  });
  
  console.log('Token request params (verifier hidden):', {
    grant_type: 'authorization_code',
    client_id: CLIENT_ID,
    redirect_uri: REDIRECT_URI,
    code: code.substring(0, 20) + '...',
    code_verifier: '***HIDDEN***'
  });
  
  try {
    console.log('Sending token request to https://id.kick.com/oauth/token');
    
    const response = await fetch('https://id.kick.com/oauth/token', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/x-www-form-urlencoded',
      },
      body: tokenParams
    });
    
    console.log('Response status:', response.status);
    
    // Try to get response text (may be empty for 400 errors)
    const responseText = await response.text();
    console.log('Response body:', responseText || '(empty response)');
    
    if (!response.ok) {
      // Try to parse error if possible
      let errorMessage = `HTTP ${response.status}`;
      if (responseText) {
        try {
          const errorJson = JSON.parse(responseText);
          errorMessage = errorJson.error_description || errorJson.error || errorMessage;
        } catch (e) {
          errorMessage = responseText.substring(0, 100);
        }
      }
      showToast(`❌ فشل تسجيل الدخول: ${errorMessage}`);
      return;
    }
    
    const tokenData = JSON.parse(responseText);
    console.log('Token received successfully!');
    
    // Store token
    sessionStorage.setItem('kick_access_token', tokenData.access_token);
    if (tokenData.refresh_token) {
      sessionStorage.setItem('kick_refresh_token', tokenData.refresh_token);
    }
    
    // Clean up PKCE data
    sessionStorage.removeItem('pkce_verifier');
    sessionStorage.removeItem('oauth_state');
    
    // Remove code from URL
    history.replaceState({}, '', window.location.pathname);
    
    // Initialize the app
    await initApp();
    
  } catch (error) {
    console.error('Token exchange error:', error);
    showToast('❌ خطأ في الاتصال: ' + error.message);
  }
}

function logout() {
  sessionStorage.removeItem('kick_access_token');
  sessionStorage.removeItem('kick_refresh_token');
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('app').style.display = 'none';
  document.getElementById('login-btn').style.display = 'flex';
  document.getElementById('logout-btn').style.display = 'none';
  document.getElementById('user-info').style.display = 'none';
  allStreams = [];
  showToast('🔓 تم تسجيل الخروج');
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
//  API
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function getAccessToken() {
  return sessionStorage.getItem('kick_access_token');
}

async function kickGet(endpoint) {
  const token = getAccessToken();
  if (!token) {
    throw new Error('No access token available');
  }
  
  const response = await fetch(`https://api.kick.com/public/v1${endpoint}`, {
    headers: {
      'Authorization': `Bearer ${token}`,
      'Accept': 'application/json'
    }
  });
  
  if (!response.ok) {
    if (response.status === 401) {
      // Token expired, need to refresh
      logout();
      throw new Error('Session expired. Please login again.');
    }
    throw new Error(`API Error: ${response.status}`);
  }
  
  return response.json();
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
//  INIT
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
async function initApp() {
  console.log('=== INITIALIZING APP ===');
  
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  document.getElementById('login-btn').style.display = 'none';
  document.getElementById('logout-btn').style.display = 'flex';
  
  try {
    const userData = await kickGet('/users/me');
    const user = userData.data || userData;
    const username = user.username || user.name || 'مستخدم';
    
    document.getElementById('user-name').textContent = username;
    if (user.profile_pic) {
      document.getElementById('user-avatar').src = user.profile_pic;
    }
    document.getElementById('user-info').style.display = 'flex';
    
    console.log('User logged in:', username);
    await loadData();
    
  } catch (error) {
    console.error('Init error:', error);
    showToast('❌ ' + error.message);
  }
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
//  LOAD DATA
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
let allStreams = [];

async function loadData() {
  const grid = document.getElementById('cards-grid');
  grid.innerHTML = Array(6).fill('<div class="skeleton-card"></div>').join('');
  
  try {
    // Get followed channels
    const followedData = await kickGet('/channels/followed?limit=100');
    const channels = followedData.data || [];
    
    if (!channels.length) {
      grid.innerHTML = empty('لا يوجد متابَعون', 'اتبع بعض الستريمرز على Kick أولاً');
      return;
    }
    
    // Fetch details for each channel
    const results = await Promise.allSettled(
      channels.map(async (channel) => {
        const slug = channel.slug || channel.username || channel.broadcaster_username;
        if (!slug) return null;
        
        try {
          const channelData = await kickGet(`/channels?slug=${encodeURIComponent(slug)}`);
          const info = Array.isArray(channelData.data) ? channelData.data[0] : channelData.data;
          return buildStreamItem(channel, info);
        } catch (error) {
          console.warn(`Failed to fetch ${slug}:`, error);
          return null;
        }
      })
    );
    
    allStreams = results
      .filter(r => r.status === 'fulfilled' && r.value && r.value.show)
      .map(r => r.value);
    
    renderCards(allStreams);
    
  } catch (error) {
    console.error('Load data error:', error);
    grid.innerHTML = empty('خطأ في التحميل', error.message);
    showToast('❌ ' + error.message);
  }
}

function buildStreamItem(channel, channelInfo) {
  const isLive = !!(channelInfo?.livestream);
  const schedules = channelInfo?.stream_schedules || [];
  const nextSchedule = findNextSchedule(schedules);
  const show = isLive || !!nextSchedule;
  
  return {
    show: show,
    slug: channel.slug || channel.username || channel.broadcaster_username || '',
    name: channelInfo?.user?.username || channel.username || channel.name || 'Unknown',
    avatar: channelInfo?.user?.profile_pic || '',
    category: isLive 
      ? (channelInfo?.livestream?.categories?.[0]?.name || '') 
      : (nextSchedule?.category_name || ''),
    title: isLive 
      ? (channelInfo?.livestream?.session_title || 'بث مباشر') 
      : (nextSchedule?.title || 'بث مجدول'),
    isLive: isLive,
    viewers: channelInfo?.livestream?.viewer_count || null,
    startTime: isLive ? null : (nextSchedule?.start_time || null)
  };
}

function findNextSchedule(schedules) {
  if (!schedules || !schedules.length) return null;
  
  const now = Date.now();
  const futureSchedules = schedules
    .map(s => ({ ...s, timestamp: new Date(s.start_time).getTime() }))
    .filter(s => !isNaN(s.timestamp) && s.timestamp > now - 3600000)
    .sort((a, b) => a.timestamp - b.timestamp);
  
  return futureSchedules[0] || null;
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
//  RENDER
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
let currentFilter = 'all';

function filterCards(filter, button) {
  currentFilter = filter;
  document.querySelectorAll('.tab').forEach(tab => tab.classList.remove('active'));
  button.classList.add('active');
  renderCards(allStreams);
}

function renderCards(streams) {
  const grid = document.getElementById('cards-grid');
  const now = new Date();
  let filteredList = streams;
  
  if (currentFilter === 'live') {
    filteredList = streams.filter(s => s.isLive);
  } else if (currentFilter === 'today') {
    filteredList = streams.filter(s => {
      if (s.isLive) return true;
      if (!s.startTime) return false;
      return new Date(s.startTime).toDateString() === now.toDateString();
    });
  } else if (currentFilter === 'upcoming') {
    filteredList = streams.filter(s => !s.isLive && s.startTime);
  }
  
  if (!filteredList.length) {
    let message = '';
    if (currentFilter === 'live') message = 'لا أحد يبث الآن';
    else if (currentFilter === 'today') message = 'لا توجد بثوث اليوم';
    else if (currentFilter === 'upcoming') message = 'لا توجد بثوث قادمة';
    else message = 'لا توجد بثوث';
    
    grid.innerHTML = empty('لا توجد بثوث', message);
    return;
  }
  
  // Sort: live first, then by schedule time
  const sorted = [...filteredList].sort((a, b) => {
    if (a.isLive && !b.isLive) return -1;
    if (!a.isLive && b.isLive) return 1;
    if (a.startTime && b.startTime) return new Date(a.startTime) - new Date(b.startTime);
    return 0;
  });
  
  grid.innerHTML = sorted.map((stream, index) => renderCard(stream, index)).join('');
}

function renderCard(stream, index) {
  const avatarHtml = stream.avatar 
    ? `<img class="avatar" src="${escapeHtml(stream.avatar)}" alt="${escapeHtml(stream.name)}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">`
    : '';
    
  const placeholderHtml = `<div class="avatar-placeholder" style="${stream.avatar ? 'display:none' : ''}">${(stream.name[0] || '?').toUpperCase()}</div>`;
  
  const liveBadge = stream.isLive ? '<div class="live-badge">LIVE</div>' : '';
  
  const viewersHtml = stream.viewers != null 
    ? `<span class="meta-pill">👁 ${formatNumber(stream.viewers)}</span>` 
    : '';
    
  const timeHtml = (!stream.isLive && stream.startTime) 
    ? `<span class="meta-pill countdown">⏰ ${formatTime(stream.startTime)}</span>` 
    : '';
    
  const categoryHtml = stream.category 
    ? `<span class="meta-pill">🎮 ${escapeHtml(stream.category)}</span>` 
    : '';
    
  const isNotified = notifications.has(stream.slug);
  
  return `
    <div class="stream-card" style="animation-delay:${index * 0.06}s">
      <div class="card-banner"></div>
      <div class="card-body">
        <div class="card-header">
          ${avatarHtml}${placeholderHtml}
          <div class="streamer-info">
            <div class="streamer-name">${escapeHtml(stream.name)}</div>
            <div class="streamer-sub">kick.com/${escapeHtml(stream.slug)}</div>
          </div>
          ${liveBadge}
        </div>
        <div class="stream-title">${escapeHtml(stream.title)}</div>
        <div class="card-meta">${viewersHtml}${timeHtml}${categoryHtml}</div>
        <div class="card-footer">
          <a class="watch-link" href="https://kick.com/${escapeHtml(stream.slug)}" target="_blank">
            ▶ ${stream.isLive ? 'شاهد الآن' : 'زيارة القناة'}
          </a>
          <button class="notify-btn ${isNotified ? 'active' : ''}" onclick="toggleNotification(this,'${escapeHtml(stream.slug)}')" title="تنبيه">🔔</button>
        </div>
      </div>
    </div>
  `;
}

function empty(title, message) {
  return `
    <div class="empty-state">
      <strong>${escapeHtml(title)}</strong>
      <p>${escapeHtml(message)}</p>
    </div>
  `;
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
//  UTILITIES
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
const notifications = new Set(JSON.parse(localStorage.getItem('kick_notifications') || '[]'));

function toggleNotification(button, slug) {
  if (notifications.has(slug)) {
    notifications.delete(slug);
    button.classList.remove('active');
    showToast('🔕 تم إلغاء التنبيه');
  } else {
    notifications.add(slug);
    button.classList.add('active');
    showToast('🔔 سيتم تنبيهك عند البدء');
  }
  localStorage.setItem('kick_notifications', JSON.stringify([...notifications]));
}

function formatTime(isoString) {
  const diff = new Date(isoString) - Date.now();
  if (diff < 0) return 'قريباً';
  
  const hours = Math.floor(diff / 3600000);
  const minutes = Math.floor((diff % 3600000) / 60000);
  
  if (hours > 0) return `بعد ${hours} س ${minutes} د`;
  if (minutes > 0) return `بعد ${minutes} دقيقة`;
  return 'الآن';
}

function formatNumber(number) {
  return number >= 1000 ? (number / 1000).toFixed(1) + 'K' : String(number);
}

function escapeHtml(text) {
  if (!text) return '';
  return String(text)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

let toastTimeout;
function showToast(message) {
  const toast = document.getElementById('toast');
  toast.textContent = message;
  toast.classList.add('show');
  
  clearTimeout(toastTimeout);
  toastTimeout = setTimeout(() => {
    toast.classList.remove('show');
  }, 3000);
}

// Auto-refresh every minute
setInterval(() => {
  if (allStreams.length) {
    renderCards(allStreams);
  }
}, 60000);

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
//  BOOTSTRAP
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
(async function bootstrap() {
  const urlParams = new URLSearchParams(window.location.search);
  const authCode = urlParams.get('code');
  const authState = urlParams.get('state');
  
  if (authCode && authState) {
    await handleCallback(authCode, authState);
  } else if (getAccessToken()) {
    await initApp();
  }
})();
</script>
